<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>EN|HE - לומדים אנגלית!</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rubik:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;
  --s1:#0d1117;
  --s2:#161b27;
  --s3:#1e2535;
  --acc:#2563eb;
  --acc2:#60a5fa;
  --acc-g:rgba(37,99,235,.28);
  --grn:#10b981;
  --grn-g:rgba(16,185,129,.22);
  --red:#f43f5e;
  --red-g:rgba(244,63,94,.22);
  --gold:#f59e0b;
  --gold-g:rgba(245,158,11,.28);
  --txt:#f1f5f9;
  --txt2:#c8d3e0;
  --mut:#566170;
  --br:rgba(255,255,255,.07);
  --br-a:rgba(96,165,250,.22);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(96,165,250,.045) 27px,rgba(96,165,250,.045) 28px),
    repeating-linear-gradient(90deg,transparent,transparent 27px,rgba(96,165,250,.025) 27px,rgba(96,165,250,.025) 28px),
    radial-gradient(ellipse 90% 55% at 50% -5%,rgba(37,99,235,.13) 0%,transparent 65%),
    radial-gradient(ellipse 55% 45% at 85% 95%,rgba(16,185,129,.07) 0%,transparent 50%);
}
.page{display:none;width:100%;max-width:480px;padding:0 16px 28px;min-height:100vh;flex-direction:column;}
.page.active{display:flex;}

/* ── HOME ── */
.h-top{
  text-align:center;
  padding:36px 16px 24px;
  margin:0 -16px 20px;
  border-bottom:1px solid var(--br);
  background:linear-gradient(180deg,rgba(37,99,235,.14) 0%,rgba(37,99,235,.03) 100%);
  position:relative;
  overflow:hidden;
}
.h-top::before{
  content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);
  width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(96,165,250,.12) 0%,transparent 70%);
  pointer-events:none;
}
.h-logo{
  display:inline-flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;letter-spacing:1px;
  color:#fff;margin-bottom:10px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  padding:10px 20px;border-radius:8px;
  box-shadow:0 4px 16px var(--acc-g);
}
.h-logo span{color:rgba(255,255,255,.35);margin:0 6px;font-weight:400;}
.h-top h1{
  font-size:38px;
  font-weight:900;
  letter-spacing:-1px;
  font-family:'Rubik',sans-serif;
  background:linear-gradient(135deg,#93c5fd 0%,#fff 50%,#60a5fa 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sc-row{display:flex;gap:12px;margin-bottom:14px;}
.sc{
  flex:1;background:var(--s1);border-radius:10px;
  padding:18px 12px 16px;text-align:center;
  border:1px solid var(--br);position:relative;overflow:hidden;
}
.sc::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:20px 20px 0 0;
}
.sc-k::after{background:linear-gradient(90deg,var(--grn),#34d399);}
.sc-u::after{background:linear-gradient(90deg,var(--red),#fb7185);}
.sc .n{font-size:36px;font-weight:900;letter-spacing:-1.5px;line-height:1;}
.sc .l{font-size:10px;font-weight:600;color:var(--mut);margin-top:6px;text-transform:uppercase;letter-spacing:.8px;}
.sc-k .n{color:var(--grn);}
.sc-u .n{color:var(--red);}
.pw{background:var(--s2);border-radius:99px;height:8px;margin:2px 0 7px;overflow:hidden;}
.pb{height:100%;background:linear-gradient(90deg,var(--grn),#34d399);border-radius:99px;transition:width .7s cubic-bezier(.4,0,.2,1);box-shadow:0 0 10px var(--grn-g);}
.pl{font-size:12px;color:var(--mut);text-align:center;margin-bottom:22px;font-weight:500;}
.h-acts{display:flex;flex-direction:column;gap:12px;margin-top:2px;}

/* ── BUTTONS ── */
.btn{
  width:100%;padding:16px;border-radius:10px;border:none;
  font-size:17px;font-weight:700;cursor:pointer;
  transition:transform .12s,box-shadow .12s,opacity .12s;
  letter-spacing:.1px;font-family:inherit;
}
.btn:active{transform:scale(.965);opacity:.9;}
.btn-p{
  background:linear-gradient(140deg,#2563eb 0%,#60a5fa 100%);
  color:#fff;
  box-shadow:0 4px 20px var(--acc-g),0 1px 0 rgba(255,255,255,.12) inset;
}
.btn-g{
  background:linear-gradient(140deg,#059669 0%,#10b981 100%);
  color:#fff;
  box-shadow:0 4px 20px var(--grn-g),0 1px 0 rgba(255,255,255,.12) inset;
}
.btn-o{background:transparent;border:1.5px solid var(--br-a);color:var(--acc2);font-weight:600;}
.btn-wl{background:var(--s1);border:1px solid var(--br-a);color:var(--acc2);font-weight:600;}

/* ── GAME HEADER ── */
.g-exit{
  background:var(--s2);border:1px solid var(--br);color:var(--mut);
  font-size:16px;font-weight:600;cursor:pointer;width:34px;height:34px;
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-family:inherit;transition:all .13s;padding:0;
}
.g-exit:active{transform:scale(.93);background:var(--s3);}
.g-mute{
  background:var(--s2);border:1px solid var(--br);color:var(--txt2);
  font-size:16px;font-weight:600;cursor:pointer;width:34px;height:34px;
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-family:inherit;transition:all .13s;padding:0;
}
.g-mute:active{transform:scale(.93);background:var(--s3);}
.g-mute.muted{color:var(--red);}
.g-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 0 8px;width:100%;gap:8px;}
.g-rd{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;}
.g-sc{
  font-size:14px;font-weight:700;color:var(--grn);
  background:rgba(16,185,129,.1);border-radius:99px;padding:5px 12px;
  border:1px solid rgba(16,185,129,.2);
}
.g-st{
  font-size:14px;font-weight:700;color:var(--gold);
  min-width:50px;text-align:left;
  background:rgba(245,158,11,.1);border-radius:99px;padding:5px 12px;
  border:1px solid rgba(245,158,11,.2);
}
.gp{width:100%;height:4px;background:var(--s2);border-radius:99px;margin-bottom:18px;overflow:hidden;}
.gpf{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px var(--acc-g);}

/* ── WORD CARD ── */
.wc{
  background:var(--s1);border-radius:12px;
  padding:28px 22px 22px;text-align:center;margin-bottom:16px;width:100%;
  border:1px solid var(--br-a);
  box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04) inset;
  min-height:132px;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.wl{font-size:13px;font-weight:700;color:var(--txt2);margin-bottom:12px;letter-spacing:.5px;}
.we{font-size:46px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1.1;}
.wa{font-size:18px;color:var(--grn);margin-top:10px;font-weight:600;opacity:0;transition:opacity .3s;min-height:26px;}
.wa.show{opacity:1;}

/* ── OPTION BUTTONS ── */
.og{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;}
.ob{
  background:var(--s1);border:1.5px solid var(--br);
  border-radius:10px;padding:16px 10px;
  font-size:16px;font-weight:600;color:var(--txt2);
  cursor:pointer;transition:all .13s ease;
  text-align:center;min-height:70px;
  display:flex;align-items:center;justify-content:center;
  line-height:1.3;font-family:inherit;
  box-shadow:0 2px 10px rgba(0,0,0,.35);
}
.ob:active:not(.disabled){transform:scale(.94);background:var(--s2);}
.ob.correct{background:rgba(16,185,129,.11);border-color:var(--grn);color:#6ee7b7;box-shadow:0 0 18px var(--grn-g);}
.ob.wrong{background:rgba(244,63,94,.1);border-color:var(--red);color:#fda4af;box-shadow:0 0 18px var(--red-g);}
.ob.disabled{pointer-events:none;}

/* ── COMBO TOAST ── */
.ct{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0) rotate(-5deg);
  background:linear-gradient(135deg,var(--gold),#f97316);
  color:#000;font-size:20px;font-weight:900;
  padding:14px 34px;border-radius:99px;z-index:999;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 36px var(--gold-g);letter-spacing:.3px;
  visibility:hidden;
}
.ct.show{transform:translate(-50%,-50%) scale(1) rotate(0deg);visibility:visible;}

/* ── SUMMARY ── */
.sb{
  background:var(--s1);border-radius:12px;
  padding:36px 22px 28px;text-align:center;width:100%;
  border:1px solid var(--br-a);
  box-shadow:0 20px 60px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04) inset;
}
.st{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:1.8px;margin-bottom:12px;}
.ss{
  font-size:76px;font-weight:900;letter-spacing:-3px;line-height:1;
  background:linear-gradient(135deg,var(--gold),#fbbf24);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin:4px 0;
}
.su{font-size:13px;color:var(--mut);font-weight:500;margin-bottom:22px;}
.sm{font-size:19px;color:var(--txt);margin-bottom:28px;font-weight:700;line-height:1.4;}
.sa{display:flex;flex-direction:column;gap:12px;}
.ss-row{display:flex;justify-content:center;margin-bottom:22px;border-radius:10px;overflow:hidden;border:1px solid var(--br);}
.ss-item{flex:1;padding:16px 8px;text-align:center;background:var(--s2);}
.ss-item+.ss-item{border-left:1px solid var(--br);}
.ss-item .n{font-size:28px;font-weight:900;letter-spacing:-1px;}
.ss-item .l{font-size:10px;font-weight:700;color:var(--mut);margin-top:4px;text-transform:uppercase;letter-spacing:.7px;}

/* ── WORD LIST ── */
.wlh{display:flex;align-items:center;gap:10px;padding:16px 0 12px;width:100%;}
.wlb{
  background:var(--s2);border:1px solid var(--br);color:var(--txt2);
  font-size:14px;font-weight:600;cursor:pointer;
  padding:9px 16px;border-radius:12px;font-family:inherit;transition:all .13s;
}
.wlb:active{transform:scale(.96);}
.wlt{font-size:17px;font-weight:700;color:var(--txt);flex:1;text-align:center;}
.wff{display:flex;gap:8px;margin-bottom:10px;}
.wfb{
  flex:1;padding:9px 6px;border-radius:12px;
  border:1px solid var(--br);background:var(--s2);
  color:var(--mut);font-size:11px;font-weight:700;
  cursor:pointer;transition:all .13s;font-family:inherit;
  text-transform:uppercase;letter-spacing:.5px;
}
.wfb.active{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border-color:transparent;box-shadow:0 2px 14px var(--acc-g);}
.wi-num{font-size:11px;color:var(--mut);font-weight:600;margin-left:6px;}
.wfs{
  width:100%;padding:14px 16px;border-radius:8px;
  border:1.5px solid var(--br);background:var(--s2);
  color:var(--txt);font-size:16px;outline:none;
  margin-bottom:10px;font-family:inherit;transition:border .2s;
  min-height:46px;
}
.wfs:focus{border-color:var(--br-a);}
.wlc{font-size:11px;font-weight:700;color:var(--mut);text-align:center;padding:6px 0;text-transform:uppercase;letter-spacing:.7px;}
.wll{overflow-y:auto;flex:1;border:1px solid var(--br);border-radius:10px;padding:10px;height:calc(100vh - 260px);background:var(--s2);}
.edit-btns{display:flex;gap:6px;}
.edit-btn{border:none;border-radius:6px;padding:6px 10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.eb-k{background:rgba(16,185,129,.15);color:var(--grn);}
.eb-w{background:rgba(244,63,94,.15);color:var(--red);}
.eb-n{background:rgba(255,255,255,.08);color:var(--txt2);}
.eb-k.active{background:var(--grn);color:#000;}
.eb-w.active{background:var(--red);color:#fff;}
.eb-n.active{background:var(--mut);color:#fff;}
.wli{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-radius:8px;margin-bottom:8px;
  background:var(--s1);border:1px solid var(--br);transition:border-color .15s;
  gap:12px;
}
.wli.known{border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.05);}
.wli.wrong{border-color:rgba(244,63,94,.25);background:rgba(244,63,94,.05);}
.wi-e{font-size:16px;font-weight:700;color:#fff;}
.wi-h{font-size:13px;color:var(--txt2);margin-top:2px;font-weight:500;}
.wi-b{font-size:17px;min-width:26px;text-align:center;}
.wi-edit{background:transparent;border:none;color:var(--txt2);font-size:11px;cursor:pointer;padding:4px 6px;transition:color .2s;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}
.wi-edit:hover{color:var(--acc);}
.wi-edit span{display:block;line-height:1;}
.edit-menu{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--s1);border:1px solid var(--br-a);border-radius:12px;padding:16px;z-index:1000;min-width:260px;box-shadow:0 20px 60px rgba(0,0,0,.7);}
.edit-menu .title{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:16px;}
.edit-menu button{width:100%;padding:12px;border:1px solid var(--br);background:var(--s2);color:var(--txt2);border-radius:8px;margin-bottom:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;}
.edit-menu button:last-child{margin-bottom:0;}
.edit-menu button:hover{background:var(--s3);border-color:var(--br-a);}
.edit-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:999;display:none;}
.edit-overlay.show{display:block;}

.icon{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:.95em;
  line-height:1;
}

@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.11)}100%{transform:scale(1)}}
.pop{animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}50%{transform:translateX(9px)}80%{transform:translateX(-4px)}}
.shake{animation:shake .35s ease;}
</style>
</head>
<body>
<div class="ct" id="ct"></div>
<div class="edit-overlay" id="editOv" onclick="closeEditMenu()"></div>
<div class="edit-menu" id="editMenu" style="display:none;">
  <div class="title" id="editTitle"></div>
  <button onclick="setWordStatus(3)">✔ יודע (מילה שקלה)</button>
  <button onclick="setWordStatus(1)">✕ לא יודע (טעיתי)</button>
  <button onclick="setWordStatus(0)">◯ חדש (לא עשיתי)</button>
</div>
<div id="pgHome" class="page active" style="justify-content:flex-start;">
  <div class="h-top">
    <div class="h-logo">EN<span>|</span>HE</div>
    <h1>לומדים אנגלית!</h1>
    <p style="font-size:13px;color:var(--mut);margin-top:6px;font-weight:500;">2807 מילים בסיסיות באנגלית</p>
  </div>
  <div class="sc-row">
    <div class="sc sc-k"><div class="n" id="hKn">0</div><div class="l">מילים שידעתי <span class="icon">✓</span></div></div>
    <div class="sc sc-u"><div class="n" id="hUn">0</div><div class="l">עוד לא ידעתי <span class="icon">○</span></div></div>
  </div>
  <div class="pw"><div class="pb" id="hPb" style="width:0%"></div></div>
  <p class="pl" id="hPl"></p>
  <div style="background:var(--s1);border:1px solid var(--br);border-radius:10px;padding:14px 16px;margin-bottom:14px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <div style="font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.7px;">טווח מילים</div>
      <button onclick="resetRange()" style="background:none;border:none;color:var(--mut);font-size:11px;font-weight:600;cursor:pointer;text-decoration:underline;font-family:inherit;transition:color .2s;">איפוס</button>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <input id="rFrom" type="number" min="1" max="2807" value="1" style="flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--br);background:var(--s2);color:var(--txt);font-size:15px;font-family:inherit;text-align:center;outline:none;" onfocus="this.style.borderColor='var(--br-a)'" onblur="this.style.borderColor='var(--br)'">
      <span style="color:var(--mut);font-weight:600;">—</span>
      <input id="rTo" type="number" min="1" max="2807" value="2807" style="flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--br);background:var(--s2);color:var(--txt);font-size:15px;font-family:inherit;text-align:center;outline:none;" onfocus="this.style.borderColor='var(--br-a)'" onblur="this.style.borderColor='var(--br)'">
    </div>
  </div>
  <div class="h-acts">
    <button class="btn btn-p" onclick="startGame()" style="font-size:19px;padding:17px;"><span class="icon">▶</span> התחל משחק</button>
    <button class="btn btn-wl" onclick="showWL()"><span class="icon">📖</span> רשימת המילים המלאה</button>
  </div>
</div>
<div id="pgGame" class="page" style="justify-content:flex-start;">
  <div class="g-hdr">
    <button class="g-exit" onclick="exitGame()">✕</button>
    <span class="g-rd" id="gRd"></span>
    <span class="g-st" id="gSt"></span>
    <button class="g-mute" id="muteBtn" onclick="toggleMute()">🔊</button>
    <span class="g-sc" id="gSc"><span class="icon">✓</span> 0</span>
  </div>
  <div class="gp"><div class="gpf" id="gPf" style="width:0%"></div></div>
  <div class="wc">
    <div class="wl" id="wLbl">מה פירוש המילה?</div>
    <div class="we" id="wEn">...</div>
    <div class="wa" id="wAns"></div>
  </div>
  <div class="og" id="og"></div>
</div>
<div id="pgSum" class="page" style="justify-content:center;">
  <div class="sb">
    <div class="st">סיכום הסבב</div>
    <div class="ss" id="sScore">0/20</div>
    <div class="su">תשובות נכונות</div>
    <div class="ss-row">
      <div class="ss-item"><div class="n" id="sOk" style="color:var(--grn)">0</div><div class="l">נכון</div></div>
      <div class="ss-item"><div class="n" id="sWr" style="color:var(--red)">0</div><div class="l">שגוי</div></div>
      <div class="ss-item"><div class="n" id="sMx" style="color:var(--gold)">0</div><div class="l">קומבו מקס</div></div>
    </div>
    <div class="sm" id="sMsg"></div>
    <div class="sa">
      <button class="btn btn-g" onclick="startGame()" style="font-size:18px;padding:15px;"><span class="icon">▶</span> סבב חדש</button>
      <button class="btn btn-o" onclick="showHome()" style="font-size:15px;padding:13px;"><span class="icon">⌂</span> חזרה לדף הבית</button>
    </div>
  </div>
</div>
<div id="pgWL" class="page" style="justify-content:flex-start;">
  <div class="wlh">
    <button class="wlb" onclick="showHome()">← חזרה</button>
    <div class="wlt">📖 כל המילים</div>
    <button class="wlb" id="editModeBtn" onclick="toggleEditMode()">עריכה</button>
  </div>
  <div class="wff">
    <button class="wfb active" id="fA" onclick="setF('all')">הכל</button>
    <button class="wfb" id="fK" onclick="setF('known')">✓ ידעתי</button>
    <button class="wfb" id="fW" onclick="setF('wrong')">✗ טעיתי</button>
    <button class="wfb" id="fN" onclick="setF('new')">○ חדש</button>
  </div>

function playFanfare(big){
  try{const ac=gAC();ac.resume();
  const t=ac.currentTime;
  const notes=big?[523,659,784,1047,1319]:[523,659,784,1047];
  notes.forEach((f,i)=>{
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type="square";
    o.frequency.value=f;
    const ts=t+i*.1;
    g.gain.setValueAtTime(0,ts);
    g.gain.linearRampToValueAtTime(.3,ts+.04);
    g.gain.exponentialRampToValueAtTime(.001,ts+.35);
    o.start(ts);o.stop(ts+.4);
  });
  }catch(e){}
}
// --- TTS via Google Translate Audio elements (cached) ---
let ttsCache={};
function ttsUrl(text,lang){
  return "https://translate.google.com/translate_tts?ie=UTF-8&tl="+lang+"&client=tw-ob&q="+encodeURIComponent(text);
}
function prefetchRound(words){
  words.forEach((w,i)=>{
    setTimeout(()=>{
      const keyEn="en:"+w.e;
      const keyHe="iw:"+w.h;
      if(!ttsCache[keyEn]){
        const a=new Audio(ttsUrl(w.e,"en"));a.preload="auto";a.load();
        ttsCache[keyEn]=a;
      }
      if(!ttsCache[keyHe]){
        const a=new Audio(ttsUrl(w.h,"iw"));a.preload="auto";a.load();
        ttsCache[keyHe]=a;
      }
    },i*120);
  });
}
async function speak(eng,heb,onDone){
  if(gMuted){setTimeout(()=>{if(onDone)onDone();},1000);return;}
  const a1=ttsCache["en:"+eng];
  const a2=ttsCache["iw:"+heb];
  if(!a1||!a2||a1.readyState<2||a2.readyState<2){speakFallback(eng,heb,onDone);return;}
  try{
    // Reset same elements — no new HTTP requests!
    a1.currentTime=0;
    a2.currentTime=0;
    a1.ontimeupdate=null;a1.onended=null;a1.onerror=null;
    a2.onended=null;a2.onerror=null;

    let hebStarted=false;
    let finished=false;
    const done=()=>{if(!finished){finished=true;if(onDone)onDone();}};

    a1.ontimeupdate=()=>{
      if(!hebStarted&&a1.duration&&a1.currentTime>=a1.duration-0.1){
        hebStarted=true;a2.play().catch(()=>{});
      }
    };
    a1.onended=()=>{if(!hebStarted){hebStarted=true;a2.play().catch(()=>done());}};
    a1.onerror=()=>done();
    a2.onended=done;
    a2.onerror=done;

    await a1.play();
  }catch(e){
    speakFallback(eng,heb,onDone);
  }
}
// Fallback: speechSynthesis with female Hebrew voice
let hebFemaleVoice=null;
function findHebFemale(){
  if(hebFemaleVoice)return hebFemaleVoice;
  if(!window.speechSynthesis)return null;
  const voices=window.speechSynthesis.getVoices();
  const heb=voices.filter(v=>v.lang.startsWith('he'));
  hebFemaleVoice=heb.find(v=>/female|woman|tal|gal/i.test(v.name))||heb[0]||null;
  return hebFemaleVoice;
}
if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged=()=>findHebFemale();
  findHebFemale();
}
function speakFallback(eng,heb,onDone){
  if(gMuted||!window.speechSynthesis){if(onDone)onDone();return;}
  window.speechSynthesis.cancel();
  const u1=new SpeechSynthesisUtterance(eng);
  u1.lang="en-US";u1.rate=0.9;
  u1.onend=()=>{
    if(!heb){if(onDone)onDone();return;}
    const u2=new SpeechSynthesisUtterance(heb);
    u2.lang="he-IL";u2.rate=0.85;
    const v=findHebFemale();
    if(v)u2.voice=v;
    u2.onend=()=>{if(onDone)onDone();};
    u2.onerror=()=>{if(onDone)onDone();};
    window.speechSynthesis.speak(u2);
  };
  u1.onerror=()=>{if(onDone)onDone();};
  window.speechSynthesis.speak(u1);
}

function shuf(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function startGame(){
  try{gAC().resume();}catch(e){}
  const p=getP();
  const rFrom=Math.max(1,parseInt(document.getElementById("rFrom").value)||1);
  const rTo=Math.min(WORDS.length,parseInt(document.getElementById("rTo").value)||WORDS.length);
  localStorage.setItem("wlRange",JSON.stringify({from:rFrom,to:rTo}));
  const pool=WORDS.slice(rFrom-1,rTo);
  const kn=pool.filter(w=>(p[w.e]||0)>=3);
  const un=pool.filter(w=>(p[w.e]||0)<3);
  const wU=Math.ceil(TOTAL*.7),wK=TOTAL-wU;
  let sel=[];
  sel=sel.concat(shuf(un).slice(0,wU));
  sel=sel.concat(shuf(kn).slice(0,Math.min(wK,TOTAL-sel.length)));
  const ss=new Set(sel.map(w=>w.e));
  if(sel.length<TOTAL)sel=sel.concat(shuf(pool.filter(w=>!ss.has(w.e))).slice(0,TOTAL-sel.length));
  gW=shuf(sel).slice(0,TOTAL);
  gI=0;gOk=0;gSt=0;gMx=0;gAnswered=false;
  showPage("pgGame");
  renderQ();
  prefetchRound(gW);
}

let ctTimer=null;

function handleAns(btn,chosen,corr,word){
  if(gAnswered)return;
  gAnswered=true;
  try{gAC().resume();}catch(e){}
  document.querySelectorAll(".ob").forEach(b=>b.classList.add("disabled"));
  const p=getP();
  const ok=(chosen===corr);
  p[word.e]=ok?Math.min((p[word.e]||0)+1,5):0;
  saveP(p);
  // show correct answer in word card
  const ans=document.getElementById("wAns");
  ans.textContent=corr;ans.classList.add("show");
  if(ok){
    btn.classList.add("correct","pop");
    gOk++;gSt++;
    if(gSt>gMx)gMx=gSt;
    showCombo(gSt);
  }else{
    btn.classList.add("wrong","shake");
    document.querySelectorAll(".ob").forEach(b=>{if(b.textContent===corr)b.classList.add("correct");});
    gSt=0;
  }
  const capturedIdx=gI;
  function advance(){
    if(gI!==capturedIdx)return;
    gI++;
    if(gI<gW.length)renderQ();
    else showSummary();
  }
  setTimeout(()=>speak(word.e,corr,advance),350);
  setTimeout(()=>{
    if(gI===capturedIdx){window.speechSynthesis&&window.speechSynthesis.cancel();advance();}
  },6500);
}

    const curV=v2===undefined?'n':(v2||0)>=3?'k':'w';
    const right=wlEditMode
      ? `<div class="edit-btns">
          <button class="edit-btn eb-k${curV==='k'?' active':''}" onclick="setWordStatus2('${w.e}','k')">✔</button>
          <button class="edit-btn eb-w${curV==='w'?' active':''}" onclick="setWordStatus2('${w.e}','w')">✕</button>
          <button class="edit-btn eb-n${curV==='n'?' active':''}" onclick="setWordStatus2('${w.e}','n')">◯</button>
         </div>`
      : `<div class="wi-b">${badge}</div>`;
    div.innerHTML=`<div><div class="wi-e"><span class="wi-num">#${wNum}</span> ${w.e}</div><div class="wi-h">${w.h}</div></div>${right}`;
    c.appendChild(div);
  });
}
function resetRange(){
  document.getElementById("rFrom").value=1;
  document.getElementById("rTo").value=2807;
  localStorage.removeItem("wlRange");
}
let wlEditMode=false;
function toggleEditMode(){
  wlEditMode=!wlEditMode;
  const btn=document.getElementById("editModeBtn");
  btn.textContent=wlEditMode?"סיום":"עריכה";
  btn.style.background=wlEditMode?"var(--acc)":"";
  btn.style.color=wlEditMode?"#fff":"";
  btn.style.borderColor=wlEditMode?"var(--acc)":"";
  renderWL();
}
function setWordStatus2(eng,status){
  const p=getP();
  if(status==='k')p[eng]=3;
  else if(status==='w')p[eng]=1;
  else delete p[eng];
  saveP(p);
  renderWL();
}
function jumpToWord(){
  const n=parseInt(document.getElementById("wlJump").value);
  if(!n||n<1||n>WORDS.length)return;
  const list=document.getElementById("wlList");
  const items=list.querySelectorAll(".wli");
  for(let i=0;i<items.length;i++){
    if(items[i].querySelector(".wi-num")&&items[i].querySelector(".wi-num").textContent==="#"+n){
      items[i].scrollIntoView({behavior:"smooth",block:"center"});
      items[i].style.outline="2px solid var(--acc)";
      setTimeout(()=>items[i].style.outline="",2000);
      break;
    }
  }
}
const range=JSON.parse(localStorage.getItem("wlRange")||'{"from":1,"to":2807}');
document.getElementById("rFrom").value=range.from;
document.getElementById("rTo").value=range.to;
showHome();
</script>
